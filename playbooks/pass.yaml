---
- name: pass
  hosts: localhost
  tasks:
    - name: Clone
      ansible.builtin.git:
        repo: 'https://git.zx2c4.com/password-store'
        dest: "{{ [distfiles_dir, 'pass'] | path_join }}"
        single_branch: true
        version: "{{ env_lock['pass'] }}"

    - name: Build
      community.general.make:
        chdir: "{{ [distfiles_dir, 'pass'] | path_join }}"

    - name: Install
      community.general.make:
        target: install
        chdir: "{{ [distfiles_dir, 'pass'] | path_join }}"
        params:
          DESTDIR: /
          WITH_ZSHCOMP: yes
      become: true
